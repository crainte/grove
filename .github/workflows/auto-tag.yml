name: Auto Tag

on:
  push:
    branches: [main]
    paths: [Cargo.toml]

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Check version change and tag
        run: |
          NEW_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          OLD_VERSION=$(git show HEAD^:Cargo.toml | grep '^version' | head -1 | sed 's/.*"\(.*\)"/\1/')
          
          if [ "$NEW_VERSION" != "$OLD_VERSION" ]; then
            TAG="v$NEW_VERSION"
            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "Tag $TAG already exists"
            else
              echo "Version changed: $OLD_VERSION -> $NEW_VERSION"
              git tag "$TAG"
              git push origin "$TAG"
            fi
          else
            echo "Version unchanged ($NEW_VERSION)"
          fi
